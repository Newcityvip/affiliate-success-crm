<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In | Affiliate Success CRM</title>
    <link rel="stylesheet" href="css/base.css?v=live-trial-stabilization">
    <link rel="stylesheet" href="css/layout.css?v=live-trial-stabilization">
    <link rel="stylesheet" href="css/components.css?v=live-trial-stabilization">
    <link rel="stylesheet" href="css/pages.css?v=live-trial-stabilization">
  </head>
  <body data-page="login">
    <main class="login-page">
      <section class="login-card glass-panel" aria-labelledby="login-title">
        <a class="brand-mark" href="index.html" aria-label="Affiliate Success CRM home">
          <span class="brand-orb" aria-hidden="true">AS</span>
          <span>
            <strong>Affiliate Success CRM</strong>
            <small>Staff workspace</small>
          </span>
        </a>

        <div class="login-heading">
          <p class="eyebrow">Secure Access</p>
          <h1 id="login-title">Staff Login</h1>
          <p class="muted">Sign in with your staff Login ID. Password/PIN verification is planned for the next security sprint.</p>
        </div>

        <form class="form-stack" data-login-form>
          <label class="field">
            <span>Login ID</span>
            <input type="text" name="loginId" autocomplete="username" placeholder="Enter your Login ID" required>
          </label>

          <button class="button button-primary" type="submit" data-login-submit>Sign in</button>
          <p class="form-note" data-login-message>Please sign in using your assigned Staff Login ID. Access is restricted to authorized staff members.</p>
        </form>
      </section>
    </main>

    <script src="js/config.js?v=live-trial-stabilization"></script>
    <script src="js/utils.js?v=live-trial-stabilization"></script>
    <script src="js/api.js?v=live-trial-stabilization"></script>
    <script src="js/auth.js?v=live-trial-stabilization"></script>
    <script src="js/router.js?v=live-trial-stabilization"></script>
    <script src="js/app.js?v=live-trial-stabilization"></script>
  </body>
</html>
